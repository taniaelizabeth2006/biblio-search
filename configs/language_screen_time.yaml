project_slug: lenguaje_pantallas_18_36m
title: "Exposicion temprana a pantallas y retraso del lenguaje expresivo"
clinical_context: >
  Consultorio de Nino Sano de un hospital. Durante controles de salud se observan
  ninos de 18 a 36 meses con preocupacion familiar o profesional por retraso del
